name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Forgejo Registry
        uses: docker/login-action@v3
        with:
          registry: git.amabel.world
          username: ${{ secrets.FORGEJO_USERNAME }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:latest
            git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:${{ github.sha }}
          no-cache: true
          build-args: |
            NEXT_PUBLIC_SERVER_URL=https://sons.netinsky.com
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_51TYjvlBiUm38af2vUhKeTSKlEiuZz1vvESnB3mwPHXuIvdL9xYWAKw7D0gKKjlOhau5OEm7BzMCbUQLMIc01DlXO00cCleOXzx

      - name: Build and push migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: migrator
          push: true
          provenance: false
          tags: |
            git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:migrator
          no-cache: true

      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key claude-deploy@${{ secrets.DEPLOY_HOST }} bash -se << 'DEPLOY'
            set -euo pipefail
            echo "${{ secrets.FORGEJO_TOKEN }}" | sudo docker login git.amabel.world -u ${{ secrets.FORGEJO_USERNAME }} --password-stdin
            sudo docker pull git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:latest
            sudo docker pull git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:migrator
            cd /root/sons-of-mountains
            sudo docker compose -f docker-compose.prod.yml up -d postgres redis
            sudo docker compose -f docker-compose.prod.yml up --force-recreate --no-deps --no-build --exit-code-from migrate migrate || true
            sudo docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps --no-build app
            sudo docker image prune -f
          DEPLOY
          rm ~/.ssh/deploy_key
