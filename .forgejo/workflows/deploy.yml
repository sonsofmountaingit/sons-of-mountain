name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: native
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync source to deploy dir
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env.production' \
            "${{ github.workspace }}/" /root/sons-of-mountains/

      - name: Rebuild and restart
        run: /root/sons-of-mountains/deploy.sh
