name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: native
    steps:
      - name: Pull latest source
        run: |
          cd /root/sons-of-mountains
          if [ ! -d .git ]; then
            git clone https://stanchito:${{ secrets.FORGEJO_TOKEN }}@git.amabel.world/stanchito/sons-of-mountains.git .
          else
            git fetch origin main
            git reset --hard origin/main
          fi

      - name: Rebuild and restart
        run: /root/sons-of-mountains/deploy.sh
