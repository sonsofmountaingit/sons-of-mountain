name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Forgejo Registry
        uses: docker/login-action@v3
        with:
          registry: git.amabel.world
          username: ${{ secrets.FORGEJO_USERNAME }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:latest
            git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:${{ github.sha }}
          cache-from: type=registry,ref=git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:buildcache
          cache-to: type=registry,ref=git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:buildcache,mode=max
          build-args: |
            DATABASE_URI=${{ secrets.DATABASE_URI }}
            PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
            NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}

      - name: Build and push migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: migrator
          push: true
          provenance: false
          tags: |
            git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:migrator
          cache-from: type=registry,ref=git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:buildcache

      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key claude-deploy@${{ secrets.DEPLOY_HOST }} << 'DEPLOY'
            echo "${{ secrets.FORGEJO_TOKEN }}" | sudo docker login git.amabel.world -u ${{ secrets.FORGEJO_USERNAME }} --password-stdin
            sudo docker pull git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:latest
            sudo docker pull git.amabel.world/${{ secrets.FORGEJO_USERNAME }}/sons-of-mountains:migrator
            cd /root/sons-of-mountains
            sudo docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps --no-build migrate
            sudo docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps --no-build app nginx
            sudo docker image prune -f
          DEPLOY
          rm ~/.ssh/deploy_key
